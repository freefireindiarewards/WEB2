<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Logo Text Changer - Puter & Gemini</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        :root {
            --bg-color: #0f0f12;
            --container-bg: #17171c;
            --accent-color: #00ff66;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 550px;
            border: 1px solid #262630;
        }

        h2 {
            text-align: center;
            color: var(--accent-color);
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input[type="file"], input[type="text"] {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background-color: #202026;
            border: 1px solid #363645;
            border-radius: 8px;
            color: #fff;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .preview-box {
            width: 100%;
            min-height: 300px;
            border: 2px dashed #363645;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 15px;
            background-color: #1a1a22;
            position: relative;
        }

        canvas {
            max-width: 100%;
            max-height: 400px;
            border-radius: 6px;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-submit:disabled {
            background-color: #363645;
            color: #888;
            cursor: not-allowed;
        }

        .status {
            display: none;
            text-align: center;
            margin-top: 15px;
            color: #ffcc00;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Logo Text Changer</h2>
    
    <div class="form-group">
        <label>Upload Original Logo:</label>
        <input type="file" id="imageInput" accept="image/*">
    </div>

    <div class="form-group">
        <label>New Text:</label>
        <input type="text" id="newTextInput" placeholder="e.g., ZYNFLOX">
    </div>

    <button class="btn-submit" id="processBtn">Replace Text with AI</button>
    <div class="status" id="statusText">AI Analyzing image details... Please wait...</div>

    <div class="preview-box">
        <canvas id="logoCanvas"></canvas>
    </div>
</div>

<script>
    // Apni Gemini API Key yahan daalein
    const GEMINI_API_KEY = "AQ.Ab8RN6I3VLqqtPvsUabobs1aOn3rguxQwtVF-mrj6uh5zP8siA"; 
    
    const imageInput = document.getElementById('imageInput');
    const newTextInput = document.getElementById('newTextInput');
    const processBtn = document.getElementById('processBtn');
    const statusText = document.getElementById('statusText');
    const canvas = document.getElementById('logoCanvas');
    const ctx = canvas.getContext('2d');
    
    let originalImage = null;

    // Image upload handle karein aur canvas par draw karein
    imageInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            originalImage = new Image();
            originalImage.onload = function() {
                canvas.width = originalImage.width;
                canvas.height = originalImage.height;
                ctx.drawImage(originalImage, 0, 0);
            }
            originalImage.src = event.target.result;
        }
        reader.readAsDataURL(file);
    });

    // Main AI Processing Button Click
    processBtn.addEventListener('click', async () => {
        const newText = newTextInput.value.trim();
        if (!originalImage || !newText) {
            alert("Please upload an image and type new text!");
            return;
        }

        statusText.style.display = 'block';
        processBtn.disabled = true;

        try {
            // Image ko base64 format me convert karna Gemini API ke liye
            const base64Data = canvas.toDataURL('image/jpeg').split(',')[1];

            // Gemini Vision Model ko payload bhejna
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: "Analyze this gaming logo image. Find the main text brand name overlay. Return a JSON object with keys: 'text_box' (with subkeys 'x', 'y', 'width', 'height' as percentage relative to image size 0-100), 'background_color_hex', and 'font_color_hex'. Only return valid JSON code, no markdown blocks." },
                            { inlineData: { mimeType: "image/jpeg", data: base64Data } }
                        ]
                    }]
                })
            });

            const result = await response.json();
            const aiText = result.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
            const data = JSON.parse(aiText);

            // Coordinates convert karein canvas dimensions ke hisab se
            const boxX = (data.text_box.x / 100) * canvas.width;
            const boxY = (data.text_box.y / 100) * canvas.height;
            const boxW = (data.text_box.width / 100) * canvas.width;
            const boxH = (data.text_box.height / 100) * canvas.height;

            // STEP 1: Purane text ko erase karna (Erase & Patch)
            ctx.fillStyle = data.background_color_hex || "#111111";
            ctx.fillRect(boxX, boxY, boxW, boxH);

            // STEP 2: Naya text overlay karna same area par
            ctx.fillStyle = data.font_color_hex || "#00ff66";
            ctx.font = `bold ${boxH * 0.8}px 'Impact', 'Arial Black', sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Text shadow/glow effect gaming look ke liye
            ctx.shadowColor = data.font_color_hex || "#00ff66";
            ctx.shadowBlur = 15;
            
            // Draw naya text box ke center me
            ctx.fillText(newText, boxX + (boxW / 2), boxY + (boxH / 2));
            
            // Reset shadows
            ctx.shadowBlur = 0;

            statusText.innerText = "Successfully Replaced!";
            setTimeout(() => { statusText.style.display = 'none'; }, 3000);

        } catch (error) {
            console.error(error);
            alert("AI execution error! Make sure your API key is valid and has vision access.");
        } finally {
            processBtn.disabled = false;
        }
    });
</script>

</body>
</html>
