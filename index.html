<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener | Black knowledge</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: sans-serif;
        }
        .custom-card {
            background: #1e293b;
            border: 1px solid #334155;
        }
        .btn-gradient {
            background: linear-gradient(90deg, #2563eb, #3b82f6);
        }
        .animate-in {
            animation: fadeInUp 0.4s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="p-4 bg-gray-900 border-b border-gray-800 shadow-xl">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-widest text-blue-500 uppercase">Black Knowledge</h1>
            <a href="https://youtube.com/@blackknowledge_190" target="_blank" class="text-red-500 text-2xl hover:scale-110 transition">
                <i class="fab fa-youtube"></i>
            </a>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="custom-card p-8 rounded-3xl shadow-2xl w-full max-w-md">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-500/10 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-link text-2xl text-blue-400"></i>
                </div>
                <h2 class="text-2xl font-extrabold">Shorten Your Link</h2>
                <p class="text-gray-400 text-sm mt-1">Ek dum fast aur secure link generator</p>
            </div>

            <div class="space-y-4">
                <input type="url" id="longUrl" placeholder="https://example.com" 
                    class="w-full p-4 rounded-2xl bg-gray-900 border border-gray-700 focus:border-blue-500 outline-none transition text-white">
                
                <button onclick="shortenURL()" id="shortenBtn" 
                    class="w-full btn-gradient py-4 rounded-2xl font-bold text-lg hover:opacity-90 active:scale-95 transition shadow-lg">
                    Shorten Now
                </button>
            </div>

            <div id="resultBox" class="mt-8 hidden animate-in">
                <div class="p-5 bg-gray-800 rounded-2xl border-2 border-dashed border-blue-500/40 text-center">
                    <p class="text-xs font-bold text-blue-400 uppercase mb-3">Chota Link Taiyar Hai:</p>
                    <div id="shortLink" class="text-lg font-mono bg-black/30 p-3 rounded-lg mb-4 break-all"></div>
                    
                    <button id="copyBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition mb-4">
                        <i class="fas fa-copy mr-2"></i> Copy Link
                    </button>

                    <div class="bg-white p-3 rounded-xl inline-block">
                        <img id="qrCode" src="" alt="QR" class="w-28 h-28">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="p-4 text-center text-gray-500 text-sm border-t border-gray-900">
        Build with ❤️ by <span class="text-blue-500">Black Knowledge</span>
    </footer>

    <script>
        async function shortenURL() {
            const input = document.getElementById('longUrl');
            const btn = document.getElementById('shortenBtn');
            let url = input.value.trim();

            if(!url) return Swal.fire('Error', 'URL toh daalo bhai!', 'error');
            if(!url.startsWith('http')) url = 'https://' + url;

            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                // Is.gd API (CORS friendly)
                const res = await fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(url)}`);
                const data = await res.json();

                if(data.shorturl) {
                    display(data.shorturl);
                } else {
                    // Fallback
                    const res2 = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(url)}`);
                    const short = await res2.text();
                    display(short);
                }
            } catch (e) {
                Swal.fire('Oops', 'Internet check karein!', 'error');
            } finally {
                btn.innerText = "Shorten Now";
                btn.disabled = false;
            }
        }

        function display(shortUrl) {
            document.getElementById('resultBox').classList.remove('hidden');
            document.getElementById('shortLink').innerText = shortUrl;
            document.getElementById('qrCode').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${shortUrl}`;
            
            document.getElementById('copyBtn').onclick = () => {
                const el = document.createElement('textarea');
                el.value = shortUrl;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                Swal.fire({ title: 'Copied!', icon: 'success', timer: 1000, showConfirmButton: false });
            };
        }
    </script>
</body>
</html>
