<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener | Black Knowledge</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        body {
            background-color: #E2E4F3; 
            font-family: 'Poppins', sans-serif;
            color: #333;
            margin: 0;
            padding: 0;
        }

        .phone-container {
            max-width: 400px;
            margin: 0 auto;
            background: #F8F9FE;
            min-height: 100vh;
            position: relative;
            padding-bottom: 80px;
            box-shadow: 0 0 50px rgba(0,0,0,0.1);
        }

        .blue-gradient-card {
            background: linear-gradient(135deg, #6295E8, #4D79D1);
            border-radius: 30px;
            box-shadow: 0 15px 30px rgba(77, 121, 209, 0.3);
        }

        .progress-container {
            background: #7D76EE;
            border-radius: 20px;
            color: white;
        }

        .custom-input {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            color: white;
            width: 100%;
            padding: 12px;
            outline: none;
        }
        .custom-input::placeholder { color: rgba(255,255,255,0.7); }

        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 360px;
            background: white;
            border-radius: 25px;
            display: flex;
            justify-content: space-around;
            padding: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .nav-item.active {
            background: #6295E8;
            color: white;
            border-radius: 15px;
            padding: 10px 15px;
        }

        .feature-card-red { background: #E18776; border-radius: 25px; color: white; }
        .feature-card-pink { background: #E882E4; border-radius: 25px; color: white; }
    </style>
</head>
<body>

<div class="phone-container">
    
    <div class="flex justify-between items-center px-6 py-8">
        <div class="flex items-center gap-3">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="w-12 h-12 rounded-xl bg-blue-100 p-1">
            <div>
                <p class="text-xs text-gray-400">Hello,</p>
                <h3 class="font-bold text-gray-800">Black Knowledge</h3>
            </div>
        </div>
        <div class="flex gap-4 text-gray-500">
            <i class="fas fa-search"></i>
            <i class="fas fa-sliders-h"></i>
        </div>
    </div>

    <div class="px-6">
        <div class="blue-gradient-card p-6 relative overflow-hidden">
            <h2 class="text-white text-2xl font-bold w-1/2">URL Shortener Tool</h2>
            <p class="text-blue-100 text-xs mt-2">100% Secure & Fast</p>
            
            <div class="mt-6 space-y-3">
                <input type="url" id="longUrl" placeholder="Paste link here..." class="custom-input">
                <button onclick="shortenURL()" class="bg-white text-blue-600 w-full py-3 rounded-xl font-bold hover:bg-gray-100 transition shadow-lg">
                    Shorten Link
                </button>
            </div>
            
            <img src="https://img.icons8.com/3d-fluency/94/link.png" class="absolute -right-2 -bottom-2 w-28 opacity-40">
        </div>
    </div>

    <div class="px-6 mt-8">
        <div class="flex justify-between items-center mb-4">
            <h4 class="font-bold text-gray-800">Your Result</h4>
            <span class="text-xs text-gray-400">See all</span>
        </div>

        <div id="resultBox" class="progress-container p-4 flex items-center gap-4 hidden">
            <div class="bg-black/20 w-12 h-12 rounded-xl flex items-center justify-center font-bold">BK</div>
            <div class="flex-grow">
                <p id="shortLink" class="text-sm font-bold truncate w-40">Link ready...</p>
                <div class="w-full bg-white/20 h-1.5 rounded-full mt-2">
                    <div class="bg-white w-3/4 h-full rounded-full"></div>
                </div>
            </div>
            <button onclick="copyLink()" class="bg-white text-purple-600 p-2 rounded-lg text-xs font-bold">Copy</button>
        </div>
        <p id="placeholderText" class="text-gray-400 text-xs italic">No links generated yet.</p>
    </div>

    <div class="px-6 mt-8">
        <div class="flex justify-between items-center mb-4">
            <h4 class="font-bold text-gray-800">Extra Tools</h4>
            <span class="text-xs text-gray-400">Popular</span>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="feature-card-red p-5 relative">
                <div class="bg-black/20 w-8 h-8 rounded-lg flex items-center justify-center mb-4">
                    <i class="fas fa-qrcode"></i>
                </div>
                <h5 class="font-bold text-sm">QR Code</h5>
                <p class="text-[10px] mt-2">⭐ 5.0</p>
            </div>

            <div class="feature-card-pink p-5 relative">
                <div class="bg-black/20 w-8 h-8 rounded-lg flex items-center justify-center mb-4">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h5 class="font-bold text-sm">Secure</h5>
                <p class="text-[10px] mt-2">⭐ 4.9</p>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active"><i class="fas fa-home"></i></div>
        <div class="nav-item text-gray-400"><i class="fas fa-shopping-bag"></i></div>
        <div class="nav-item text-gray-400"><i class="fas fa-heart"></i></div>
        <div class="nav-item text-gray-400"><i class="fas fa-clipboard-list"></i></div>
    </nav>

</div>

<script>
    async function shortenURL() {
        const input = document.getElementById('longUrl');
        let url = input.value.trim();

        if(!url) return Swal.fire('Error', 'Link please!', 'error');
        if(!url.startsWith('http')) url = 'https://' + url;

        Swal.showLoading();

        try {
            const res = await fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(url)}`);
            const data = await res.json();
            if(data.shorturl) {
                document.getElementById('resultBox').classList.remove('hidden');
                document.getElementById('placeholderText').classList.add('hidden');
                document.getElementById('shortLink').innerText = data.shorturl;
                Swal.close();
            }
        } catch (e) {
            Swal.fire('Error', 'Try again later', 'error');
        }
    }

    function copyLink() {
        const text = document.getElementById('shortLink').innerText;
        navigator.clipboard.writeText(text);
        Swal.fire({ title: 'Copied!', icon: 'success', timer: 1000, showConfirmButton: false, toast: true, position: 'top-end' });
    }
</script>

</body>
</html>
