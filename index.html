<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener | Black knowledge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col font-sans">

    <header class="bg-gray-800 p-4 border-b border-gray-700">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <h1 class="text-xl font-bold text-gray-200">URL Shortener</h1>
            <a id="ytLink" href="#" class="text-red-600 hover:text-red-400 text-3xl transition duration-300">
                <i class="fab fa-youtube"></i>
            </a>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-700 text-center">
            <h2 class="text-2xl font-bold mb-6 text-blue-400">🔗 Link Shortener</h2>
            <input type="url" id="longUrl" placeholder="Paste link here..." class="w-full p-4 rounded-lg bg-gray-700 border border-gray-600 mb-4 focus:outline-none focus:border-blue-500 text-white">
            
            <button onclick="shortenURL()" id="btnText" class="w-full bg-blue-600 py-3 rounded-lg font-bold text-lg hover:bg-blue-700 transition">Shorten Link</button>

            <div id="resultBox" class="mt-8 hidden p-5 bg-gray-700 rounded-xl border border-dashed border-gray-500">
                <p class="text-xs text-gray-400 mb-2">Pasand nahi aaya? Link par click karke badlein:</p>
                <span id="shortLink" onclick="shortenURL()" class="text-blue-300 font-mono break-all text-xl block mb-4 cursor-pointer hover:text-blue-100 underline decoration-dotted"></span>
                
                <button id="copyBtn" class="bg-blue-500 px-10 py-3 rounded-full font-bold mb-4 shadow-lg active:scale-95 transition">Copy Link</button>
                
                <img id="qrCode" src="" alt="QR" class="w-32 h-32 mx-auto bg-white p-2 rounded-lg mt-2">
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 p-4 text-center border-t border-gray-700">
        <p class="text-gray-400">created by <strong class="text-blue-400">Black knowledge</strong></p>
    </footer>

    <script>
        // YouTube Redirect Fix
        document.getElementById('ytLink').onclick = function(e) {
            e.preventDefault();
            window.open("https://youtube.com/@blackknowledge_190?si=19CrKLvND1LzwkN9", "_blank");
        };

        async function shortenURL() {
            const longUrlInput = document.getElementById('longUrl');
            let longUrl = longUrlInput.value;
            const btn = document.getElementById('btnText');
            
            if(!longUrl) return Swal.fire('Opps!', 'Pehle link daalo bhai!', 'warning');

            // Agar user ne bina http ke dala ho toh add kar do
            if(!longUrl.startsWith('http')) longUrl = 'https://' + longUrl;

            btn.innerText = "Generating...";
            
            try {
                // TinyURL with unique string trick (taaki har baar naya link mile)
                // Hum URL ke peeche ek random query parameter bhej rahe hain
                const randomId = Math.random().toString(36).substring(7);
                const separator = longUrl.includes('?') ? '&' : '?';
                const cacheBusterUrl = longUrl + separator + "bk=" + randomId;

                const res = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(cacheBusterUrl)}`);
                
                if(res.ok) {
                    const shortUrl = await res.text();
                    document.getElementById('resultBox').classList.remove('hidden');
                    const shortLinkSpan = document.getElementById('shortLink');
                    shortLinkSpan.innerText = shortUrl;
                    document.getElementById('qrCode').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${shortUrl}`;
                    
                    // FIXED COPY FUNCTION (Mobile Friendly)
                    document.getElementById('copyBtn').onclick = () => {
                        copyToClipboard(shortUrl);
                    };
                }
            } catch (e) { 
                Swal.fire('Error', 'API response error. Net check karein.', 'error'); 
            }
            btn.innerText = "Shorten Link";
        }

        // Sabse best copy method jo mobile par fail nahi hota
        function copyToClipboard(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                Swal.fire({
                    title: 'Copy Ho Gaya! ✅',
                    background: '#1f2937',
                    color: '#fff',
                    confirmButtonText: 'Mast!',
                    confirmButtonColor: '#3b82f6',
                    footer: '<a href="https://youtube.com/@blackknowledge_190" target="_blank" style="color:#3b82f6">YouTube: Black knowledge</a>',
                    showDenyButton: true,
                    denyButtonText: 'Home Page'
                }).then((result) => { 
                    if (result.isDenied) window.location.reload(); 
                });
            } catch (err) {
                alert('Copy failed, please long press the link.');
            }
            document.body.removeChild(textArea);
        }
    </script>
</body>
</html>
