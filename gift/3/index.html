<html lang="en">
<head>

        body { background: #121212; color: #fff; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }

        h2 { color: #f3ae24; margin-bottom: 15px; font-size: 22px; text-shadow: 0 0 8px rgba(243,174,36,0.3); }
        p { color: #ccc; font-size: 13px; margin-bottom: 0; }
    </style>
</head>
<body>
    <div class="card">
        <h2>⚡ CYBER GOLD V3</h2>
